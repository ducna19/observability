# Optional POC Mimir.
# Dùng sau khi LGTM Lite chạy ổn.

minio:
  enabled: true

mimir:
  structuredConfig:
    multitenancy_enabled: false

    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 200000
      max_global_series_per_user: 200000

alertmanager:
  enabled: false

ruler:
  enabled: false

nginx:
  enabled: true

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    size: 20Gi

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    size: 10Gi

compactor:
  replicas: 1
  persistentVolume:
    enabled: true
    size: 10Gi

distributor:
  replicas: 1

querier:
  replicas: 1

query_frontend:
  replicas: 1

query_scheduler:
  replicas: 0

overrides_exporter:
  enabled: false

gateway:
  enabled: false
