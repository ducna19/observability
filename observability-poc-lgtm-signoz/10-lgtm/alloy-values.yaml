controller:
  type: daemonset

serviceAccount:
  create: true

rbac:
  create: true

alloy:
  clustering:
    enabled: false

  # Mount log paths for Kubernetes pod log collection.
  mounts:
    varlog: true
    dockercontainers: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

  configMap:
    create: true
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_service"]
          target_label  = "service"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_team"]
          target_label  = "team"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_env"]
          target_label  = "env"
        }

        rule {
          target_label = "cluster"
          replacement  = "k8s-poc-01"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        stage.cri {}

        stage.labels {
          values = {
            namespace = "",
            pod       = "",
            container = "",
            app       = "",
            service   = "",
            team      = "",
            env       = "",
            cluster   = "",
          }
        }

        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.obs-lgtm.svc.cluster.local/loki/api/v1/push"
        }
      }

      otelcol.receiver.otlp "apps" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }

        http {
          endpoint = "0.0.0.0:4318"
        }

        output {
          traces = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.batch "default" {
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.obs-lgtm.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }
