apiVersion: v1
kind: ConfigMap
metadata:
  name: poc-observability-dashboard
  namespace: obs-lgtm
  labels:
    grafana_dashboard: "1"
data:
  poc-service-overview.json: |
    {
      "title": "POC - Service Overview",
      "uid": "poc-service-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "tags": ["poc", "observability"],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(kube_pod_info, namespace)",
            "current": {"text": "poc-apps", "value": "poc-apps"}
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Requests Rate",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_requests_total{namespace=\"poc-apps\"}[5m])) by (service, route, status)"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP Error Rate",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_requests_total{namespace=\"poc-apps\",status=~\"5..\"}[5m])) by (service, route)"
            }
          ]
        },
        {
          "type": "logs",
          "title": "Recent Error Logs",
          "gridPos": {"x": 0, "y": 8, "w": 24, "h": 10},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "{namespace=\"poc-apps\"} |= \"ERROR\""
            }
          ]
        }
      ]
    }
