global:
  extraEnvFrom:
    - secretRef:
        name: lgtm-object-storage

minio:
  enabled: false

mimir:
  structuredConfig:
    multitenancy_enabled: true

    common:
      storage:
        backend: s3
        s3:
          endpoint: ${S3_ENDPOINT}
          region: ${S3_REGION}
          access_key_id: ${AWS_ACCESS_KEY_ID}
          secret_access_key: ${AWS_SECRET_ACCESS_KEY}
          bucket_name: ${MIMIR_BLOCKS_BUCKET}

    blocks_storage:
      backend: s3
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION}
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        bucket_name: ${MIMIR_BLOCKS_BUCKET}
      bucket_store:
        sync_dir: /data/tsdb-sync
      tsdb:
        dir: /data/tsdb

    ruler_storage:
      backend: s3
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION}
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        bucket_name: ${MIMIR_RULER_BUCKET}

    alertmanager_storage:
      backend: s3
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION}
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        bucket_name: ${MIMIR_ALERTMANAGER_BUCKET}

    limits:
      ingestion_rate: 200000
      ingestion_burst_size: 400000
      max_global_series_per_user: 2000000
      max_label_names_per_series: 40
      compactor_blocks_retention_period: 30d

    server:
      log_level: info

alertmanager:
  enabled: true
  replicas: 3

ruler:
  enabled: true
  replicas: 2

nginx:
  enabled: true
  replicas: 2

distributor:
  replicas: 3
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 6Gi

ingester:
  replicas: 3
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    size: 100Gi
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "6"
      memory: 16Gi

store_gateway:
  replicas: 3
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi

compactor:
  replicas: 1
  persistentVolume:
    enabled: true
    size: 100Gi
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi

querier:
  replicas: 3
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi

query_frontend:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

query_scheduler:
  replicas: 2

overrides_exporter:
  enabled: true
