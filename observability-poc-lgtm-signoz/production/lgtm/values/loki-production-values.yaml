deploymentMode: SimpleScalable

loki:
  auth_enabled: true

  commonConfig:
    replication_factor: 3

  limits_config:
    retention_period: 720h
    allow_structured_metadata: true
    split_queries_by_interval: 15m
    max_query_parallelism: 64
    ingestion_rate_mb: 64
    ingestion_burst_size_mb: 128

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: REPLACE_ME_LOKI_CHUNKS_BUCKET
      ruler: REPLACE_ME_LOKI_RULER_BUCKET
      admin: REPLACE_ME_LOKI_ADMIN_BUCKET
    s3:
      endpoint: REPLACE_ME_S3_ENDPOINT
      region: REPLACE_ME_S3_REGION
      accessKeyId: REPLACE_ME_ACCESS_KEY
      secretAccessKey: REPLACE_ME_SECRET_KEY
      s3ForcePathStyle: false

  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    delete_request_store: s3

  rulerConfig:
    enable_api: true
    storage:
      type: s3
      s3:
        bucketnames: REPLACE_ME_LOKI_RULER_BUCKET

read:
  replicas: 3
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi

write:
  replicas: 3
  persistence:
    size: 100Gi
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 12Gi

backend:
  replicas: 3
  persistence:
    size: 100Gi
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 12Gi

gateway:
  enabled: true
  replicas: 2

chunksCache:
  enabled: true
  replicas: 2

resultsCache:
  enabled: true
  replicas: 2

minio:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: true
