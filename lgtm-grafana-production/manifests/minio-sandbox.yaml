apiVersion: v1
kind: Secret
metadata:
  name: lgtm-minio-credentials
  namespace: observability
type: Opaque
stringData:
  MINIO_ROOT_USER: learning-lab-access-key
  MINIO_ROOT_PASSWORD: learning-lab-secret-key-change-me
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lgtm-minio-data
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lgtm-minio
  namespace: observability
spec:
  serviceName: lgtm-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lgtm-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lgtm-minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - :9001
          envFrom:
            - secretRef:
                name: lgtm-minio-credentials
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lgtm-minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm-minio
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lgtm-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: batch/v1
kind: Job
metadata:
  name: lgtm-minio-create-buckets
  namespace: observability
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          envFrom:
            - secretRef:
                name: lgtm-minio-credentials
          command:
            - /bin/sh
            - -ec
            - |
              until mc alias set local http://lgtm-minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
                echo "waiting for minio..."
                sleep 5
              done

              for bucket in \
                learning-lab-mimir-blocks \
                learning-lab-mimir-ruler \
                learning-lab-mimir-alertmanager \
                learning-lab-loki-chunks \
                learning-lab-loki-ruler \
                learning-lab-loki-admin \
                learning-lab-tempo-traces; do
                mc mb --ignore-existing "local/${bucket}"
              done

              mc ls local
