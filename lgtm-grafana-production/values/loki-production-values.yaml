deploymentMode: SimpleScalable

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  limits_config:
    retention_period: 720h
    allow_structured_metadata: true
    split_queries_by_interval: 15m
    max_query_parallelism: 64
    ingestion_rate_mb: 64
    ingestion_burst_size_mb: 128

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: learning-lab-loki-chunks
      ruler: learning-lab-loki-ruler
      admin: learning-lab-loki-admin
    s3:
      endpoint: http://lgtm-minio.observability.svc.cluster.local:9000
      region: local-1
      accessKeyId: learning-lab-access-key
      secretAccessKey: learning-lab-secret-key-change-me
      s3ForcePathStyle: true
      insecure: true

  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    delete_request_store: s3

  rulerConfig:
    enable_api: true
    storage:
      type: s3
      s3:
        bucketnames: learning-lab-loki-ruler

read:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

write:
  replicas: 1
  persistence:
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

backend:
  replicas: 1
  persistence:
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

gateway:
  enabled: true
  replicas: 1

chunksCache:
  enabled: false

resultsCache:
  enabled: false

minio:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: true
