global:
  extraEnvFrom:
    - secretRef:
        name: lgtm-object-storage

minio:
  enabled: false

mimir:
  structuredConfig:
    multitenancy_enabled: true

    common:
      storage:
        backend: s3
        s3:
          endpoint: lgtm-minio.observability.svc.cluster.local:9000
          region: local-1
          access_key_id: learning-lab-access-key
          secret_access_key: learning-lab-secret-key-change-me
          bucket_name: learning-lab-mimir-blocks
          insecure: true

    blocks_storage:
      backend: s3
      s3:
        endpoint: lgtm-minio.observability.svc.cluster.local:9000
        region: local-1
        access_key_id: learning-lab-access-key
        secret_access_key: learning-lab-secret-key-change-me
        bucket_name: learning-lab-mimir-blocks
        insecure: true
      bucket_store:
        sync_dir: /data/tsdb-sync
      tsdb:
        dir: /data/tsdb

    ruler_storage:
      backend: s3
      s3:
        endpoint: lgtm-minio.observability.svc.cluster.local:9000
        region: local-1
        access_key_id: learning-lab-access-key
        secret_access_key: learning-lab-secret-key-change-me
        bucket_name: learning-lab-mimir-ruler
        insecure: true

    alertmanager_storage:
      backend: s3
      s3:
        endpoint: lgtm-minio.observability.svc.cluster.local:9000
        region: local-1
        access_key_id: learning-lab-access-key
        secret_access_key: learning-lab-secret-key-change-me
        bucket_name: learning-lab-mimir-alertmanager
        insecure: true

    limits:
      ingestion_rate: 200000
      ingestion_burst_size: 400000
      max_global_series_per_user: 2000000
      max_label_names_per_series: 40
      compactor_blocks_retention_period: 30d

    server:
      log_level: info

alertmanager:
  enabled: true
  replicas: 1

ruler:
  enabled: true
  replicas: 1

nginx:
  enabled: true
  replicas: 1

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 6Gi

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

compactor:
  replicas: 1
  persistentVolume:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi

query_frontend:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

query_scheduler:
  replicas: 1

overrides_exporter:
  enabled: true
